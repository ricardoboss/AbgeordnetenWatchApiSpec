name: Generate

on:
  push:
    branches:
      - main
    paths:
      - '**/*.tsp'
      - 'tspconfig.yaml'
      - 'package.json'
      - 'yarn.lock'
      - '.github/workflows/generate.yml'

  pull_request:
    branches:
      - main
    paths:
      - '**/*.tsp'
      - 'tspconfig.yaml'
      - 'package.json'
      - 'yarn.lock'
      - '.github/workflows/generate.yml'

jobs:
  generate:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: 'true'

      - name: Enable Corepack
        run: corepack enable

      - uses: actions/setup-node@v6
        with:
          node-version: latest
          cache: 'yarn'
          cache-dependency-path: AbgeordnetenWatchDotNet.ApiSpec/yarn.lock

      - name: Prepare yarn
        run: corepack prepare $(node -p "require('./package.json').packageManager") --activate

      - name: Cache Yarn
        uses: actions/cache@v4
        with:
          path: .yarn/cache
          key: yarn-${{ hashFiles('**/yarn.lock') }}

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build
        run: yarn build-trace

      - name: Commit changes
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git add generated/openapi.yaml
          git diff --staged --exit-code || git commit -m "chore: regenerate openapi.yaml" && git push
