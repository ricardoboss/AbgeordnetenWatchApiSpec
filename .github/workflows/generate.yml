name: Generate

on:
  push:
    branches:
      - main
    paths:
      - '**/*.tsp'
      - 'tspconfig.yaml'
      - 'package.json'
      - 'yarn.lock'
      - '.github/workflows/generate.yml'

  pull_request:
    branches:
      - main
    paths:
      - '**/*.tsp'
      - 'tspconfig.yaml'
      - 'package.json'
      - 'yarn.lock'
      - '.github/workflows/generate.yml'

jobs:
  generate:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: 'true'

      - name: Enable Corepack
        run: corepack enable

      - name: Prepare Yarn
        run: corepack prepare $(node -p "require('./package.json').packageManager") --activate

      - uses: actions/setup-node@v6
        with:
          node-version: latest
          cache: 'yarn'
          cache-dependency-path: yarn.lock

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build
        run: yarn build-trace

      - name: Commit changes
        if: github.event.pull_request.head.repo.full_name == github.repository || github.event_name == 'push'
        run: |
          git add generated/openapi.yaml

          if git diff --staged --exit-code; then
            echo "::notice::No changes to openapi.yaml, skipping commit"
            exit 0
          fi

          git commit -m "chore: regenerate openapi.yaml"
          git push origin HEAD:${{ github.head_ref || github.ref_name }}

          echo "::notice::Committed and pushed regenerated openapi.yaml"
          echo "### OpenAPI spec regenerated" >> $GITHUB_STEP_SUMMARY
          echo "Committed updated \`generated/openapi.yaml\`" >> $GITHUB_STEP_SUMMARY
