name: Notify Consumers

on:
  push:
    branches: [ main ]
    paths: [ generated/openapi.yaml ]

jobs:
  dispatch:
    name: Dispatch

    runs-on: ubuntu-latest

    steps:
      - uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.PAT_ABGEORDNETENWATCHDOTNET }}
          repository: ricardoboss/AbgeordnetenWatchDotNet
          event-type: spec-updated
